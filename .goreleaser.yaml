version: 2

project_name: cc-dailyuse-bar

builds:
  - id: cc-dailyuse-bar-darwin
    main: ./src
    binary: cc-dailyuse-bar
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
  - id: cc-dailyuse-bar-linux
    main: ./src
    binary: cc-dailyuse-bar
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

